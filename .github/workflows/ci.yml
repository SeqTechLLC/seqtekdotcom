name: CI

on:
  push:
    branches:
      - main
      - 'spike/**'
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

# Opt action runtimes into Node 24 ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel in-progress runs on a new push to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck + Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Audit production dependencies (high+ severity)
        run: npm audit --omit=dev --audit-level=high

  lint-workflows:
    name: Workflows lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint .github/workflows/*.yml
        run: ./actionlint -color

  infra-synth:
    name: CDK synth + assertion tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm --prefix infra ci

      - name: CDK synth (staging)
        run: npm --prefix infra run synth -- -c env=staging --quiet

      - name: CDK synth (prod)
        run: npm --prefix infra run synth -- -c env=prod --quiet

      - name: Vitest (CDK assertions)
        run: npm --prefix infra run test

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 now requires a paid license for org repos.
      # Run the gitleaks CLI directly instead — same scanner, no license needed.
      - name: Install gitleaks
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gitleaks

      - name: Scan full history
        run: gitleaks detect --redact --no-banner --log-level warn --exit-code 1

  int-tests:
    name: Vitest (integration, testcontainers-backed)
    runs-on: ubuntu-latest
    needs: quality
    # No postgres service container — vitest.globalSetup.ts spins up an
    # ephemeral postgres:16 via @testcontainers/postgresql per ARCHITECTURE.md
    # §12. ubuntu-latest runners ship with a running Docker daemon.
    env:
      PAYLOAD_SECRET: ci-${{ github.run_id }}-${{ github.run_attempt }}
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (integration)
        run: npm run test:int

  tests:
    name: Playwright + axe + Lighthouse
    runs-on: ubuntu-latest
    needs: quality
    services:
      # Required for `next build` (Payload reads DATABASE_URL at build time
      # for prerender) and for the dev server Playwright spawns via
      # `webServer.command`. The int suites use testcontainers in a separate
      # job above and do not need this service.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seqtek
          POSTGRES_PASSWORD: seqtek
          POSTGRES_DB: seqtek_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U seqtek -d seqtek_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://seqtek:seqtek@localhost:5433/seqtek_dev
      # Synthetic per-run secret — never reused, never represents a real env.
      PAYLOAD_SECRET: ci-${{ github.run_id }}-${{ github.run_attempt }}
      # CSP defaults to report-only — matches local dev and the tests that
      # assert on the Content-Security-Policy-Report-Only header.
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Build (production)
        run: npm run build

      - name: Playwright E2E + axe a11y
        run: npm run test:e2e

      - name: Lighthouse CI (a11y/best-practices/SEO gate; perf as warnings)
        run: npm run test:lhci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7
