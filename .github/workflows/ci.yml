name: CI

on:
  push:
    branches:
      - main
      - 'spike/**'
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

# Opt action runtimes into Node 24 ahead of the June 2026 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel in-progress runs on a new push to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the tree changed so the heavy jobs can skip on
  # docs-only / workflow-only / infra-only changes. The workflow trigger stays
  # broad (no top-level `paths:`) on purpose: the workflow ALWAYS runs, so every
  # job emits a check run. A job skipped by `if:` reports "skipped", which branch
  # protection treats as a satisfied required check. A workflow-level `paths:`
  # filter would instead leave the required checks Pending forever → unmergeable.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      infra: ${{ steps.filter.outputs.infra }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      # Checkout is needed for push-event diffing; on pull_request the action
      # uses the GitHub API (hence pull-requests: read) and ignores the checkout.
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Allowlists (not a denylist) so the failure direction is safe: an
          # unclassified path simply won't set `src`, and the worst case is one
          # PR's heavy tests being skipped — caught fast, trivially fixed by
          # adding the path here. New source-relevant root configs must be added.
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'tailwind.config.mjs'
              - 'postcss.config.mjs'
              - 'eslint.config.mjs'
              - '.lighthouserc.cjs'
              - 'playwright.config.ts'
              - 'playwright.visual.config.ts'
              - 'vitest.config.mts'
              - 'vitest.setup.ts'
              - 'vitest.globalSetup.ts'
            infra:
              - 'infra/**'
            workflows:
              - '.github/workflows/**'

  quality:
    name: Typecheck + Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Audit production dependencies (high+ severity)
        run: npm audit --omit=dev --audit-level=high

  lint-workflows:
    name: Workflows lint (actionlint)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint .github/workflows/*.yml
        run: ./actionlint -color

  infra-synth:
    name: CDK synth + assertion tests
    runs-on: ubuntu-latest
    needs: [quality, changes]
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm --prefix infra ci

      - name: CDK synth (staging)
        run: npm --prefix infra run synth -- -c env=staging --quiet

      - name: CDK synth (prod)
        run: npm --prefix infra run synth -- -c env=prod --quiet

      - name: Vitest (CDK assertions)
        run: npm --prefix infra run test

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 now requires a paid license for org repos.
      # Run the gitleaks CLI directly instead — same scanner, no license needed.
      - name: Install gitleaks
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gitleaks

      - name: Scan full history
        run: gitleaks detect --redact --no-banner --log-level warn --exit-code 1

  int-tests:
    name: Vitest (integration, testcontainers-backed)
    runs-on: ubuntu-latest
    needs: [quality, changes]
    if: needs.changes.outputs.src == 'true'
    # No postgres service container — vitest.globalSetup.ts spins up an
    # ephemeral postgres:18 via @testcontainers/postgresql per ARCHITECTURE.md
    # §12. ubuntu-latest runners ship with a running Docker daemon.
    env:
      PAYLOAD_SECRET: ci-${{ github.run_id }}-${{ github.run_attempt }}
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (integration)
        run: npm run test:int

  tests:
    name: Playwright + axe + Lighthouse
    runs-on: ubuntu-latest
    needs: [quality, changes]
    if: needs.changes.outputs.src == 'true'
    # Job runs inside Microsoft's official Playwright image: Chromium +
    # all required Linux libs are preinstalled. Eliminates the recurring
    # `npx playwright install --with-deps chromium` apt-get hang on
    # GH-hosted runners. Bump the tag in lockstep with @playwright/test
    # in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      # --ipc=host prevents Chromium shared-memory crashes inside Docker.
      options: --ipc=host
    services:
      # Reachable as `postgres:5432` inside the container job (not as
      # `localhost:5433` — host-port mapping doesn't apply when the job
      # itself is containerized; we talk to the service via the docker
      # network using its service name).
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: seqtek
          POSTGRES_PASSWORD: seqtek
          POSTGRES_DB: seqtek_dev
        options: >-
          --health-cmd "pg_isready -U seqtek -d seqtek_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://seqtek:seqtek@postgres:5432/seqtek_dev
      # Synthetic per-run secret — never reused, never represents a real env.
      PAYLOAD_SECRET: ci-${{ github.run_id }}-${{ github.run_attempt }}
      # CSP defaults to report-only — matches local dev and the tests that
      # assert on the Content-Security-Policy-Report-Only header.
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Playwright E2E + axe a11y
        run: npm run test:e2e

      - name: Resolve Playwright Chromium binary for Lighthouse
        id: chrome
        # @lhci/cli uses chrome-launcher under the hood, which doesn't know
        # about Microsoft's /ms-playwright path. Resolve the actual binary
        # so lhci's chrome-launcher picks it up via CHROME_PATH.
        run: |
          CHROME_PATH=$(node -e "console.log(require('playwright').chromium.executablePath())")
          echo "path=${CHROME_PATH}" >> "$GITHUB_OUTPUT"

      - name: Lighthouse CI (a11y/best-practices/SEO gate; perf as warnings)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.path }}
        run: npm run test:lhci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7
