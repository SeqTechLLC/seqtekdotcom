name: Deploy (staging)

# Staging-only continuous delivery. Production auto-deploy is intentionally
# deferred until leadership approves the seqtek.com DNS cutover (Phase 6 of
# the website roadmap). When that happens, this workflow either grows an
# `env` input or a sibling `deploy-prod.yml` lands alongside it.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stack-filter:
        description: 'CDK stack glob (e.g., SeqtekStaging*Compute or SeqtekStaging*)'
        default: 'SeqtekStaging*Compute'
        type: string

permissions:
  id-token: write
  contents: read
  deployments: write # so the GitHub Environment records the deployment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: seqtek-website

# Pairs with CloudFormation's native stack-update lock — a second run started
# while one is in flight queues rather than racing. Never cancel a deploy
# mid-flight (FR-016).
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    environment: staging
    env:
      STACK_FILTER: ${{ github.event.inputs.stack-filter || 'SeqtekStaging*Compute' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (staging OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/SeqtekStagingDeploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-deploy-staging-${{ github.run_id }}

      - name: Resolve ECR registry + image tags
        id: img
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          SHA_TAG="${GITHUB_SHA::7}"
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}"
          {
            echo "registry=${REGISTRY}"
            echo "image=${IMAGE}"
            echo "sha-tag=${SHA_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: ECR login
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ steps.img.outputs.registry }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.sha-tag }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install infra dependencies
        run: npm --prefix infra ci

      - name: cdk deploy (${{ env.STACK_FILTER }})
        # LaunchTemplate UserData references `:latest` indirectly; the
        # LaunchTemplate version bump from `cdk deploy` triggers the ASG
        # rolling instance refresh.
        run: |
          npm --prefix infra run cdk -- deploy -c env=staging "$STACK_FILTER" \
            --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Wait for ASG instance refresh
        # Poll up to 15 min. Pass-through if the stack filter didn't touch
        # an ASG (e.g. observability-only deploy).
        run: |
          set -euo pipefail
          ASG_NAME=$(aws cloudformation describe-stack-resources \
            --stack-name SeqtekStagingCompute \
            --query "StackResources[?ResourceType=='AWS::AutoScaling::AutoScalingGroup'].PhysicalResourceId | [0]" \
            --output text 2>/dev/null || echo None)
          if [ -z "$ASG_NAME" ] || [ "$ASG_NAME" = "None" ]; then
            echo "No ASG resource found in SeqtekStagingCompute — skipping refresh wait."
            exit 0
          fi
          echo "ASG: $ASG_NAME"
          for i in $(seq 1 90); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --max-records 1 \
              --query "InstanceRefreshes[0].Status" \
              --output text)
            echo "[$i] instance refresh status: $STATUS"
            case "$STATUS" in
              Successful)
                exit 0
                ;;
              Failed|Cancelled|RollbackFailed|RollbackSuccessful)
                echo "Instance refresh terminated in non-success state: $STATUS"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out after 15 min waiting for ASG instance refresh."
          exit 1

      - name: Resolve staging site URL (from SeqtekStagingEdge output)
        id: site
        run: |
          set -euo pipefail
          URL=$(aws cloudformation describe-stacks \
            --stack-name SeqtekStagingEdge \
            --query "Stacks[0].Outputs[?OutputKey=='SiteUrl'].OutputValue | [0]" \
            --output text)
          if [ -z "$URL" ] || [ "$URL" = "None" ]; then
            echo "Could not resolve SeqtekStagingEdge SiteUrl output."
            exit 1
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Post-deploy smoke
        env:
          POST_DEPLOY_URL: ${{ steps.site.outputs.url }}
        run: npx playwright test tests/e2e/post-deploy-smoke.e2e.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-playwright-report
          path: playwright-report/
          retention-days: 7
