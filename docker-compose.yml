services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: seqtek
      POSTGRES_PASSWORD: seqtek
      POSTGRES_DB: seqtek_dev
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seqtek -d seqtek_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
