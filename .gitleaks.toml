title = "SEQTEK website — gitleaks config"

# Inherit gitleaks' built-in rule set (AWS, GCP, Azure, Stripe, GitHub tokens,
# generic API keys, high-entropy strings, private keys, etc.).
[extend]
useDefault = true

# Project-wide allowlist. Keep this tight — broad excludes defeat the point.
[allowlist]
description = "SEQTEK project allowlist"
paths = [
  '''^node_modules/''',
  '''^\.next/''',
  '''^playwright-report/''',
  '''^test-results/''',
  '''^playwright/\.cache/''',
  '''^tests/e2e/screenshots/''',
  # npm hashes look high-entropy but are not secrets
  '''^package-lock\.json$''',
]
regexes = [
  # .env.example placeholder
  '''replace_me_with_a_32_byte_random_hex_value''',
  # Public marketing-side identifiers documented in INTEGRATIONS.md
  '''AW-810041431''',         # Google Ads conversion ID (public)
  '''GTM-[A-Z0-9]+''',         # GTM container IDs (public)
  # HubSpot form GUIDs — public (visible in any embed code), documented in
  # INTEGRATIONS.md §1.2. List each provisioned GUID explicitly; do NOT use a
  # broad UUID pattern, which would mask real UUID-shaped secrets.
  '''66dba2bf-f099-44d5-8c6e-f24292cefe53''', # Workshop Inquiry form GUID
  # E2E-only default for REVALIDATION_SECRET (playwright.config.ts). Not a real
  # secret — only injected into the test-spawned dev server so seeded-content
  # tests can call the /api/revalidate route. Mirrors the existing int-test
  # placeholder ('test-revalidation-secret').
  '''e2e-revalidation-secret''',
]
